<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تيك كارد - الأقسام</title>
    <link rel="stylesheet" href="styles.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-title { font-size: 1.5rem; color: white; margin: 20px 0; font-weight: 800; }
        .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .cat-card { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 25px 15px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.05); text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; transition: transform 0.2s; }
        .cat-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .cat-icon-wrapper { width: 60px; height: 60px; background: rgba(6, 182, 212, 0.1); color: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
        .cat-card.purple .cat-icon-wrapper { background: rgba(16, 60, 231, 0.1); color: #8e54e9; }
        .cat-card.green .cat-icon-wrapper { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .cat-card.yellow .cat-icon-wrapper { background: rgba(250, 204, 21, 0.1); color: #facc15; }
        .cat-title { font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="bg-glow top-glow"></div>

    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="icon-btn menu-btn"><i class="fa-solid fa-arrow-right"></i></a>
            <div class="logo">
                <span class="logo-text">ARRAK <span class="highlight">LLC</span></span>
            </div>
            <div class="header-actions">
                <a href="cart.html" class="icon-btn cart-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="badge">0</span>
                </a>
            </div>
        </div>
        <div class="container">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="ابحث في الأقسام...">
            </div>
        </div>
    </header>

    <main class="container" style="padding-bottom: 90px; margin-top: 10px;">
        <h1 class="page-title">تصفح الأقسام</h1>
        
        <div class="categories-grid">
            <a href="#" class="cat-card">
                <div class="cat-icon-wrapper"><i class="fa-solid fa-gamepad"></i></div>
                <span class="cat-title">شحن الألعاب</span>
            </a>
            <a href="#" class="cat-card purple">
                <div class="cat-icon-wrapper"><i class="fa-solid fa-tv"></i></div>
                <span class="cat-title">بطاقات البث المنزلي</span>
            </a>
            <a href="#" class="cat-card green">
                <div class="cat-icon-wrapper"><i class="fa-solid fa-music"></i></div>
                <span class="cat-title">البرامج الصوتية</span>
            </a>
            <a href="#" class="cat-card yellow">
                <div class="cat-icon-wrapper"><i class="fa-solid fa-shield-halved"></i></div>
                <span class="cat-title">برامج الحماية</span>
            </a>
            <a href="#" class="cat-card">
                <div class="cat-icon-wrapper"><i class="fa-brands fa-apple"></i></div>
                <span class="cat-title">بطاقات آبل</span>
            </a>
            <a href="#" class="cat-card purple">
                <div class="cat-icon-wrapper"><i class="fa-brands fa-playstation"></i></div>
                <span class="cat-title">بلايستيشن & اكسبوكس</span>
            </a>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
        </a>
        <a href="categories.html" class="nav-item active">
            <i class="fa-solid fa-border-all"></i>
            <span>الأقسام</span>
        </a>
        <a href="cart.html" class="nav-item cart-btn-nav">
            <div class="nav-icon-wrapper">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="nav-badge">0</span>
            </div>
            <span>السلة</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>حسابي</span>
        </a>
    </nav>
</body>
</html>
