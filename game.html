<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تيك كارد - شحن شدات ببجي</title>
    <link rel="stylesheet" href="styles.css?v=5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .player-id-section { background: rgba(255,255,255,0.05); padding: 20px; border-radius: var(--radius-md); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .player-id-section h3 { margin-bottom: 15px; font-size: 1rem; color: white; display: flex; align-items: center; gap: 8px; }
        .id-input-wrapper { display: flex; gap: 10px; }
        .id-input-wrapper input { flex: 1; background: var(--bg-surface-light); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 15px; border-radius: var(--radius-sm); font-family: monospace; font-size: 1.1rem; text-align: left; direction: ltr; }
        .id-input-wrapper input:focus { border-color: var(--primary); outline: none; }
        .verify-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: var(--radius-sm); font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .verify-btn:hover { background: var(--primary-light); }
        .player-name-result { margin-top: 15px; padding: 10px; border-radius: var(--radius-sm); background: rgba(16, 185, 129, 0.1); color: #10b981; font-weight: bold; display: none; align-items: center; gap: 8px; }
        
        .packages-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        @media(min-width: 768px) { .packages-grid { grid-template-columns: repeat(3, 1fr); } }
        .pkg-card { background: var(--bg-surface-light); border: 2px solid transparent; border-radius: var(--radius-sm); padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .pkg-card input { display: none; }
        .pkg-card:hover { border-color: rgba(255,255,255,0.2); }
        .pkg-card input:checked + .pkg-inner { color: white; }
        .pkg-card:has(input:checked) { border-color: var(--primary); background: rgba(92, 36, 255, 0.1); }
        .pkg-icon { width: 40px; height: 40px; margin: 0 auto 10px; }
        .pkg-icon img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .pkg-amount { font-size: 1.2rem; font-weight: 800; color: white; margin-bottom: 5px; }
        .pkg-bonus { font-size: 0.75rem; color: #facc15; font-weight: bold; margin-bottom: 8px; display: block; }
        .pkg-price { color: #ff3366; font-weight: bold; font-size: 0.95rem; }
        
        /* Sidebar/Menu Overlay */
        .side-menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(5px); }
        .side-menu-overlay.active { opacity: 1; pointer-events: all; }
        .side-menu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--bg-surface); z-index: 2001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -5px 0 25px rgba(0,0,0,0.5); }
        .side-menu.active { right: 0; }
        .sm-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .sm-close { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .sm-links { padding: 20px 0; overflow-y: auto; flex: 1; }
        .sm-link { display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: white; text-decoration: none; font-size: 1.1rem; transition: background 0.2s; }
        .sm-link:hover { background: rgba(255,255,255,0.05); color: var(--primary-light); }
        .sm-link i { width: 25px; text-align: center; color: var(--primary); }
        
        /* Toast Notification */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #10b981; color: white; padding: 15px 25px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-weight: bold; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="product-page-body">
    <!-- Background Glow Effects -->
    <div class="bg-glow top-glow"></div>
    <div class="bg-glow mid-glow"></div>

    <!-- Side Menu -->
    <div class="side-menu-overlay" id="menuOverlay"></div>
    <nav class="side-menu" id="sideMenu">
        <div class="sm-header">
            <div class="logo">
                <span class="logo-text">ARRAK <span class="highlight">LLC</span></span>
            </div>
            <button class="sm-close" id="closeMenu"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sm-links">
            <a href="index.html" class="sm-link"><i class="fa-solid fa-house"></i> الرئيسية</a>
            <a href="categories.html" class="sm-link"><i class="fa-solid fa-border-all"></i> الأقسام</a>
            <a href="product.html" class="sm-link"><i class="fa-solid fa-fire"></i> أحدث العروض</a>
            <a href="cart.html" class="sm-link"><i class="fa-solid fa-cart-shopping"></i> سلة المشتريات</a>
            <a href="account.html" class="sm-link"><i class="fa-regular fa-user"></i> حسابي</a>
        </div>
    </nav>
    
    <!-- Toast -->
    <div class="toast" id="cartToast">
        <i class="fa-solid fa-circle-check"></i> تم إضافة المنتج بنجاح!
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container header-inner">
            <button class="icon-btn menu-btn" id="openMenu"><i class="fa-solid fa-bars"></i></button>
            <div class="logo">
                <a href="index.html" style="text-decoration:none; color:inherit;"><span class="logo-text">ARRAK <span class="highlight">LLC</span></span></a>
            </div>
            <div class="header-actions">
                <a href="cart.html" class="icon-btn cart-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="badge" id="headerCartBadge">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="product-main container">
        <nav class="breadcrumb">
            <a href="index.html">الرئيسية</a>
            <i class="fa-solid fa-angle-left"></i>
            <a href="categories.html">شحن الألعاب</a>
            <i class="fa-solid fa-angle-left"></i>
            <span>شدات ببجي موبايل</span>
        </nav>

        <div class="product-layout">
            <!-- Product Image Side -->
            <div class="product-gallery">
                <div class="main-image-glass" style="background: linear-gradient(145deg, rgba(250, 204, 21, 0.05), rgba(0,0,0,0.2));">
                    <img src="https://cdn.salla.sa/form-builder/dediRZdw9UyWrXxuSo1wtOiSjjmFgg8oq08x1NTt.png" onerror="this.src='https://placehold.co/400x400/2a1b54/FFF?text=PUBG';" alt="PUBG Mobile" class="p-img" id="mainProdImage">
                    <div class="glass-badge instant"><i class="fa-solid fa-bolt"></i> شحن فوري ID</div>
                </div>
            </div>

            <!-- Product Details Side -->
            <div class="product-info-glass">
                <h1 class="p-title">شحن شدات ببجي موبايل (عن طريق الـ ID المباشر)</h1>

                <!-- Player ID Section -->
                <div class="player-id-section">
                    <h3><i class="fa-solid fa-gamepad"></i> أدخل الأيدي الخاص بك (Player ID)</h3>
                    <div class="id-input-wrapper">
                        <input type="number" id="playerId" placeholder="مثال: 5123456789" required>
                        <button class="verify-btn" onclick="verifyId()">التحقق <i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                    <div class="player-name-result" id="playerNameResult">
                        <i class="fa-solid fa-circle-check"></i> اسم اللاعب: <strong>ARRAK_GAMER</strong>
                    </div>
                </div>

                <div class="p-pricing">
                    <div class="p-price-block">
                        <span class="p-new-price" id="displayPrice">20 ر.س</span>
                    </div>
                </div>

                <!-- Packages Grid -->
                <h3 class="opt-title">اختر باقة الشدات (UC)</h3>
                <div class="packages-grid">
                    <label class="pkg-card">
                        <input type="radio" name="package" value="60uc" onclick="updatePrice('4')">
                        <div class="pkg-inner">
                            <div class="pkg-icon"><img src="https://images.cgames.de/images/gamestar/226/pubg-mobile-uc_6072124.jpg" onerror="this.src='https://placehold.co/40x40/FFCC00/000?text=UC'" alt="UC"></div>
                            <div class="pkg-amount">60 UC</div>
                            <span class="pkg-bonus"></span>
                            <div class="pkg-price">4.00 ر.س</div>
                        </div>
                    </label>
                    <label class="pkg-card">
                        <input type="radio" name="package" value="325uc" onclick="updatePrice('20')" checked>
                        <div class="pkg-inner">
                            <div class="pkg-icon"><img src="https://images.cgames.de/images/gamestar/226/pubg-mobile-uc_6072124.jpg" onerror="this.src='https://placehold.co/40x40/FFCC00/000?text=UC'" alt="UC"></div>
                            <div class="pkg-amount">300 UC</div>
                            <span class="pkg-bonus">+ 25 مجاناً</span>
                            <div class="pkg-price">20.00 ر.س</div>
                        </div>
                    </label>
                    <label class="pkg-card">
                        <input type="radio" name="package" value="660uc" onclick="updatePrice('39')">
                        <div class="pkg-inner">
                            <div class="pkg-icon"><img src="https://images.cgames.de/images/gamestar/226/pubg-mobile-uc_6072124.jpg" onerror="this.src='https://placehold.co/40x40/FFCC00/000?text=UC'" alt="UC"></div>
                            <div class="pkg-amount">600 UC</div>
                            <span class="pkg-bonus">+ 60 مجاناً</span>
                            <div class="pkg-price">39.00 ر.س</div>
                        </div>
                    </label>
                    <label class="pkg-card">
                        <input type="radio" name="package" value="1800uc" onclick="updatePrice('95')">
                        <div class="pkg-inner">
                            <div class="pkg-icon"><img src="https://images.cgames.de/images/gamestar/226/pubg-mobile-uc_6072124.jpg" onerror="this.src='https://placehold.co/40x40/FFCC00/000?text=UC'" alt="UC"></div>
                            <div class="pkg-amount">1500 UC</div>
                            <span class="pkg-bonus">+ 300 مجاناً</span>
                            <div class="pkg-price">95.00 ر.س</div>
                        </div>
                    </label>
                </div>

                <div class="p-actions desktop-actions">
                    <button class="btn-primary bulk-add-btn" onclick="addToCart(this)">
                        <i class="fa-solid fa-cart-arrow-down"></i> أضف للسلة
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Sticky Bottom Bar Mobile -->
    <div class="mobile-sticky-checkout">
        <div class="sticky-price">
            <span class="sp-lbl">الإجمالي:</span>
            <span class="sp-val" id="stickyTotal">20 ر.س</span>
        </div>
        <button class="btn-primary bulk-add-btn sticky-btn" onclick="addToCart(this)">
            <i class="fa-solid fa-cart-arrow-down"></i> أضف للسلة
        </button>
    </div>

    <!-- Generic Scripts for Interactivity -->
    <script>
        // Menu Toggle
        const menuBtn = document.getElementById('openMenu');
        const closeBtn = document.getElementById('closeMenu');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');

        function toggleMenu() {
            sideMenu.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        if(menuBtn) menuBtn.addEventListener('click', toggleMenu);
        if(closeBtn) closeBtn.addEventListener('click', toggleMenu);
        if(overlay) overlay.addEventListener('click', toggleMenu);

        // Price updating
        let currentPrice = 20;
        function updatePrice(newP) {
            document.getElementById('displayPrice').innerText = newP + ' ر.س';
            document.getElementById('stickyTotal').innerText = newP + ' ر.س';
            currentPrice = parseFloat(newP);
            
            const priceBlock = document.querySelector('.p-price-block');
            priceBlock.style.transform = 'scale(1.1)';
            setTimeout(() => priceBlock.style.transform = 'scale(1)', 200);
        }

        // Mock verification
        function verifyId() {
            const input = document.getElementById('playerId');
            const result = document.getElementById('playerNameResult');
            if(input.value.length > 5) {
                result.style.display = 'flex';
                // Animation
                result.animate([ {opacity: 0, transform: 'translateY(-10px)'}, {opacity: 1, transform: 'translateY(0)'} ], {duration: 300, fill: 'forwards'});
            } else {
                alert('يرجى إدخال أيدي صحيح يتكون من 5 أرقام على الأقل');
                result.style.display = 'none';
            }
        }

        // Add to cart with Toast
        function addToCart(btnElement) {
            // Check ID
            const input = document.getElementById('playerId');
            if(input && input.value.length < 5) {
                alert('عذراً، يجب ادخال الايدي (Player ID) بشكل صحيح لإتمام الطلب.');
                input.focus();
                return;
            }

            // Animate Button
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الإضافة...';
            
            setTimeout(() => {
                btnElement.innerHTML = '<i class="fa-solid fa-check"></i> تمت الإضافة';
                btnElement.style.background = '#10b981'; // Green
                
                // Show Toast
                const toast = document.getElementById('cartToast');
                toast.classList.add('show');
                
                // Update Badges
                const badges = document.querySelectorAll('.badge, .nav-badge');
                badges.forEach(b => {
                    let count = parseInt(b.textContent || '0');
                    b.textContent = count + 1;
                    b.style.transform = 'scale(1.5)';
                    setTimeout(() => b.style.transform = 'scale(1)', 300);
                });

                setTimeout(() => {
                    btnElement.innerHTML = originalHTML;
                    btnElement.style.background = '';
                    toast.classList.remove('show');
                }, 2500);
            }, 600);
        }
    </script>
</body>
</html>
