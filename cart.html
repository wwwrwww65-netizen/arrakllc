<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تيك كارد - السلة</title>
    <link rel="stylesheet" href="styles.css?v=10">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-title { font-size: 1.5rem; color: white; margin: 20px 0; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .cart-item { display: flex; gap: 15px; background: var(--bg-surface); padding: 15px; border-radius: var(--radius-md); margin-bottom: 15px; align-items: center; position: relative; }
        .cart-img { width: 80px; height: 80px; object-fit: contain; background: var(--bg-surface-light); border-radius: var(--radius-sm); padding: 5px; }
        .cart-details { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .c-title { font-size: 1rem; color: white; margin: 0; }
        .c-price { color: #ff3366; font-weight: bold; font-size: 1.1rem; }
        .remove-btn { background: rgba(255, 51, 102, 0.1); color: #ff3366; border: none; padding: 8px; border-radius: var(--radius-sm); cursor: pointer; position: absolute; top: 15px; left: 15px; font-size: 1.1rem; }
        .cart-summary { background: var(--bg-surface); padding: 20px; border-radius: var(--radius-md); margin-top: 30px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-muted); font-size: 0.95rem; }
        .summary-row.total { color: white; font-size: 1.2rem; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .checkout-btn { width: 100%; height: 50px; border-radius: var(--radius-md); font-size: 1.1rem; margin-top: 20px; background: linear-gradient(90deg, #103ce7, #06b6d4); border: none; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4); }
        .qty-small { display: flex; align-items: center; background: var(--bg-main); border-radius: var(--radius-sm); width: fit-content; }
        .qty-small button { background: transparent; border: none; color: white; width: 30px; height: 30px; cursor: pointer; }
        .qty-small input { width: 30px; background: transparent; border: none; color: white; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <!-- Scroll Progress Bar -->
    <div class="scroll-progress-bar" id="scrollProgressBar"></div>

    <!-- Aurora Animated Background -->
    <div class="aurora-wrap">
        <div class="aurora-orb"></div>
        <div class="aurora-orb"></div>
        <div class="aurora-orb"></div>
    </div>

    <!-- Floating Bubbles -->
    <div class="particles-canvas" id="particlesCanvas"></div>

    <!-- Glowing Grid Overlay -->
    <div class="grid-overlay"></div>

    <div class="bg-glow top-glow"></div>

    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="icon-btn menu-btn"><i class="fa-solid fa-arrow-right"></i></a>
            <div class="logo">
                <span class="logo-text">ARRAK <span class="highlight">LLC</span></span>
            </div>
            <div class="header-actions"></div>
        </div>
    </header>

    <main class="container" style="padding-bottom: 100px;">
        <h1 class="cart-title">سلة المشتريات</h1>
        
        <div class="cart-items">
            <!-- Sample Item -->
            <div class="cart-item touch-hover" data-tilt>
                <button class="remove-btn touch-hover" title="حذف"><i class="fa-solid fa-trash-can"></i></button>
                <img src="https://cdn.salla.sa/form-builder/0g0huFYTMdfy4WucpFHfEjvxZKufwBUXt6O42hH9.png" class="cart-img" alt="Product">
                <div class="cart-details">
                    <h3 class="c-title">اشتراك واتش ات Watch IT | شهر واحد</h3>
                    <div class="c-price">35 ر.س</div>
                    <div class="qty-small">
                        <button><i class="fa-solid fa-minus"></i></button>
                        <input type="text" value="1" readonly>
                        <button><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>المجموع الفرعي</span>
                <span>35 ر.س</span>
            </div>
            <div class="summary-row">
                <span>الضريبة (15%)</span>
                <span>5.25 ر.س</span>
            </div>
            <div class="summary-row total">
                <span>الإجمالي</span>
                <span style="color:#ff3366;">40.25 ر.س</span>
            </div>
            
            <button class="checkout-btn touch-hover"><i class="fa-solid fa-credit-card"></i> إتمام الطلب</button>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
        </a>
        <a href="categories.html" class="nav-item">
            <i class="fa-solid fa-border-all"></i>
            <span>الأقسام</span>
        </a>
        <a href="cart.html" class="nav-item active cart-btn-nav">
            <div class="nav-icon-wrapper">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="nav-badge">1</span>
            </div>
            <span>السلة</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>حسابي</span>
        </a>
    </nav>
    <script src="script.js"></script>
    <script src="animations.js"></script>
</body>
</html>
